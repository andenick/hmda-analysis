version: '3.8'

services:
  hmda-dashboard:
    build: .
    container_name: hmda-stakeholder-dashboard
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=0
    volumes:
      # Mount data directory for persistent storage
      - ./Output/Data:/app/Output/Data:ro
      # Mount logs directory
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - hmda-network

  # Optional: Add Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: hmda-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL certificates
    depends_on:
      - hmda-dashboard
    restart: unless-stopped
    networks:
      - hmda-network

networks:
  hmda-network:
    driver: bridge

volumes:
  logs:
    driver: local